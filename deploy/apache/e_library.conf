<VirtualHost *:80>
    ServerName e-library.local

    ProxyPreserveHost On
    ProxyRequests Off

    # FastAPI backend via systemd (uvicorn on localhost:8000)
    ProxyPass / http://127.0.0.1:8085/
    ProxyPassReverse / http://127.0.0.1:8085/

    ErrorLog ${APACHE_LOG_DIR}/e_library_error.log
    CustomLog ${APACHE_LOG_DIR}/e_library_access.log combined
</VirtualHost>
